		<script type="text/javascript">
			GetEmps();
	  	var OperatorsArray = sessionStorage.getItem("Operators");
			console.log("OperatorsArray = " + OperatorsArray);
  		var Operators = JSON.parse(OperatorsArray);
			var Numbers = Operators.number;
			console.log("Number = " + Numbers);
			
			function chooseEmployee(number)
			{
				var EmployeeInfo = Operators.data[number];
				console.log("EmployeeInfo = " + EmployeeInfo);
				sessionStorage.setItem("EmployeeInfo", EmployeeInfo);
				sessionStorage.setItem("EditUser", true);
				sessionStorage.setItem("Mode", 2);
				sessionStorage.setItem("Page", 1);				
				top.location.href="index.html";
			}
			
			function convertToBinary(x) {
    		let bin = 0;
    		let rem, i = 1, step = 1;
    		while (x != 0) {
	        rem = x % 2;
        	x = parseInt(x / 2);
        	bin = bin + rem * i;
        	i = i * 10;
	    	}
  	  	console.log(`Binary: ${bin}`);
  	  	return bin;
			}
			
			function deleteEmployee(number)
			{
				var EmployeeInfo = Operators.data[number];
				console.log("EmployeeInfo = " + EmployeeInfo);

			}
	  	function createTable()
	  	{
				var tableNode; 
				sessionStorage.setItem("EditUser", false);
	  		for(let i = 0; i < Numbers; i++)
	  			{
					tableNode = document.getElementById("work_table");
					var trNode = tableNode.insertRow(); 
					var tdEdit = trNode.insertCell(); 
					var btn = document.createElement('input');
					btn.type = "button";
					btn.className = "btn";
					btn.value = "編輯";
					btn.onclick = (function(i) {return function() {chooseEmployee(i);}})(i);
					tdEdit.appendChild(btn);

					btn = document.createElement('input');
					btn.type = "button";
					btn.className = "btn";
					btn.value = "刪除";
					btn.onclick = (function(i) {return function() {deleteEmployee(i);}})(i);
					tdEdit.appendChild(btn);

					var tdEmployeeId = trNode.insertCell(); 
					tdEmployeeId.innerHTML = Operators.data[i][0];

					var tdEmployeeCropID = trNode.insertCell(); 
					tdEmployeeCropID.innerHTML = Operators.data[i][1];

					var tdEmployeeName = trNode.insertCell(); 
					tdEmployeeName.innerHTML = Operators.data[i][2];

					var tdEmployeeTEL1 = trNode.insertCell(); 
					tdEmployeeTEL1.innerHTML = Operators.data[i][3];

					var tdEmployeeTEL2 = trNode.insertCell(); 
					tdEmployeeTEL2.innerHTML = Operators.data[i][4];

					var tdEmployeeConnect = trNode.insertCell(); 
					tdEmployeeConnect.innerHTML = Operators.data[i][5];

					var tdEmployeeAddr1 = trNode.insertCell(); 
					tdEmployeeAddr1.innerHTML = Operators.data[i][6];

					var tdEmployeeAddr2 = trNode.insertCell(); 
					tdEmployeeAddr2.innerHTML = Operators.data[i][7];
					
					var tdEmployeeEmpMemo = trNode.insertCell(); 
					tdEmployeeEmpMemo.innerHTML = Operators.data[i][8];

					var tdEmployeeMachineId = trNode.insertCell(); 
					tdEmployeeMachineId.innerHTML = Operators.data[i][9];

					var tdEmployeeExtNum = trNode.insertCell(); 
					tdEmployeeExtNum.innerHTML = Operators.data[i][10];
	  			
	  				//var DecValue = Operators.data[i][4];
	  				//var Bits = convertToBinary(DecValue);
					//var tdMachineBitMasks = trNode.insertCell(); 
					//tdMachineBitMasks.innerHTML = Bits;
	  			

					//var tdExtNum = trNode.insertCell(); 
					//tdExtNum.innerHTML = Operators.data[i][8];
					document.getElementById("div1").appendChild(tableNode);
				}
			}
			
			function AddUserPage()
			{
				sessionStorage.setItem("Page", 4);
				top.location.href="index.html";
