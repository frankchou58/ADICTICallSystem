<!DOCTYPE HTML><html lang='zh_TW'>
	<head>
		<title>新增員工資料頁面</title>
		<meta charset="utf-8" />
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
		<script type="text/javascript" src="scripts/main.js?4"></script>
   	<link href="css/editTable.css" rel="stylesheet"/>
		<script type="text/javascript">
			var AddedCustomerResult;
			var ThisUUID;
			
			function AddRantDeviceOption()
			{
				var select = document.getElementById('rantdevices');
				for(let i = 1; i < 100; i++)
				{
			    var opt = document.createElement('option');
    			opt.value = i;
    			opt.innerHTML = i;
					select.appendChild(opt);
				}
			}
			function AddRantBridgeOption()
			{
				var select = document.getElementById('rantBridge');
				for(let i = 0; i <= 50; i++)
				{
			    var opt = document.createElement('option');
    			opt.value = i;
    			opt.innerHTML = i;
					select.appendChild(opt);
				}
			}
			function AddRantPriceOption()
			{
				var select = document.getElementById('rantPrice');
				for(let i = 0.1; i < 10.0; i+=0.1)
				{
			    var opt = document.createElement('option');
    			opt.value = i.toFixed(2);
    			opt.innerHTML = i.toFixed(2);
					select.appendChild(opt);
				}
			}
			function validateEmail(email)
			{
  			const re = /^(([^<>()[\]\\.,;:\s@\"]+(\.[^<>()[\]\\.,;:\s@\"]+)*)|(\".+\"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/;
  			return re.test(email);
			}
			
			function SetCustomerInfoResponse()
			{
 				console.log(this.responseText);       	
  			if(this.readyState === XMLHttpRequest.DONE && this.status === 200)
  			{
				}
			}
			
			function SetCustomerInfo(type, Value)
			{
 				var Url;
				if(type == "name")
					Url = BackEndURL + 'SetOperatorName.php?Key=' + ThisUUID + '&Name=' + Value;
				console.log("URL: " + Url);
				var xmlHttp = new XMLHttpRequest();
 				xmlHttp.open( "GET", Url, false);
 				xmlHttp.onreadystatechange = SetCustomerInfoResponse;
 				xmlHttp.send();
			}

			function AddedCustomerResponse()
			{
				const $result = $("#result");
				console.log('Complete Added Customer');
 				console.log(this.status);       	
  			if(this.readyState === XMLHttpRequest.DONE && this.status === 200)
  			{
  				console.log(this.responseText);
  				var Val;
  				Val = JSON.parse(this.responseText);
				
					sessionStorage.setItem('AddedCustomer', false);
					if(Val.status == false)
					{
						if(Val.message == 23000)
						{
							$result.text('失敗: 客戶識別碼重複');
						}
						$result.css("color", "rgb(189 10 0)");
						AddedCustomerResult = 0;
					}
					else if(Val.status == true)
					{
						$result.text = ('成功' + Val.message);
						AddedCustomerResult = 1;
						ThisUUID = Val.UUID;
					}
				}
			}
			
			function AddedCustomer()
			{
				var Customerid = document.getElementById('Customerid');
				var name = document.getElementById('name');
				var Gender = document.getElementById('Gender');
				var telno = document.getElementById('telno');
				var county = document.getElementById('county');
				var townships = document.getElementById('townships');
				var address = document.getElementById('address');
				var Birthday = document.getElementById('Birthday');

				const $result = $("#result");
				if(
					Customerid.value == ""
					)
				{
					$result.text("所有欄位不能為空");
					$result.css("color", "rgb(189 10 0)");
					return false;
				}
				
				console.log("帳號: " + Customerid.value);
				console.log("姓名: " + name.value);
				console.log("性別: " + Gender.value);
				console.log("電話: " + telno.value);
				console.log("地址: " + county.value + townships.value + address.value);
				console.log("生日: " + Birthday.value);

				var GenderValue;
				if(Gender.value == '男')
					GenderValue = 1;
				else 	if(Gender.value == '女')
					GenderValue = 2;
				var xmlHttp = new XMLHttpRequest();
 				var URL = BackEndURL + 'AddCustomer.php?CustomerId=' + Customerid.value + '&Name=' + name.value + '&Gender=' + GenderValue + 
 					'&TelNo=' + telno.value + '&County=' + county.value + '&Townships=' + townships.value + '&Address=' + address.value + '&Birthday=' + Birthday.value;
				console.log('URL = ' + URL);
 				xmlHttp.open( "GET", URL, false);
 				xmlHttp.onreadystatechange = AddedCustomerResponse;
 				xmlHttp.send();
 				
 				//console.log("ThisUUID: " + ThisUUID);
 				if(AddedCustomerResult == 1)
 				{
					SetCustomerInfo("name", name.value);
					sessionStorage.setItem("Page", 2);
					top.location.href="index.html";			
				}
			}
			
		</script>
	</head>
	<body">
		<h1>填妥下列表單資料,按下提交新增一位客戶資料</h1>
		<form action="" method="get" class="form-example">
  		<div class="form-example">
    		<label for="Customerid">客戶識別碼: </label>
    		<input type="Customerid" name="Customerid" id="Customerid" required>
  		</div>
  		<div class="form-example">
    		<label for="name">姓名: </label>
    		<input type="text" name="name" id="name" required>
  		</div>
  		<div class="form-example">
    		<label for="Gender">性別: </label>
  			<select id="Gender" required>
  				<option>男</option>
  				<option>女</option>
				</select>
  		</div>
  		<div class="form-example">
    		<label for="telno">聯絡電話: </label>
    		<input type="text" name="telno" id="telno" required>
  		</div>
  		<div class="form-example">
    		<label for="address">通訊地址: </label>
    		<input type="text" name="county" id="county" size=5 required>縣市
    		<input type="text" name="townships" id="townships" size=5 required>鄉鎮市區
    		<input type="text" name="address" id="address" size=15 required>
  		</div>
  		<div class="form-example">
    		<label for="Birthday">生日: </label>
    		<input type="date" name="Birthday" id="Birthday" required>
  		</div>
  		<div class="form-example">
				<form method="post" action="">
    			<input type="button" value="提交" id="addedCustomer" onclick="AddedCustomer()"/>
    			<input type="reset">
    		</form>
  		<h3 id="result"></h3>
  		</div>
		</form>
	</body>	
</html>
