<!DOCTYPE HTML><html lang='zh_TW'>
	<head>
		<meta charset="utf-8" />
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
		<script type="text/javascript" src="scripts/main.js?7"></script>
   	<link href="css/CallStatus.css?3" rel="stylesheet"/>
		<script type="text/javascript">
			var FoundCustomer = 0;
			var CustomerName;
			var CustomerCounty;
			var CustomerTownships;
			var CustomerAddress;
			var CustomerInBlackList;
			let MachineBitMask;
			var OperatorName;
			var OutPortNums = 0;
			var ExtNum;
			var FoundOperator = 0;
			let ws;
			var m_MachineID = new Array(240);
			var m_OutVPortNo = new Array(240);
			var m_OutPhyPortNo = new Array(240);
			var MachineColorArray = new Array(10); 
			MachineColorArray[0] = "#B8FAA7";
			MachineColorArray[1] = "#E9F2B3";
			MachineColorArray[2] = "#C6D0EE";
			MachineColorArray[3] = "#E1FAA7";
			MachineColorArray[4] = "#C8C0E0";
			MachineColorArray[5] = "#D2CEAF";
			MachineColorArray[6] = "#E8FFBF";
			MachineColorArray[7] = "#F5B0AB";
			MachineColorArray[8] = "#BAE7DD";
			MachineColorArray[9] = "#F3A7FA";

			var WSRRL = GetWSURL();
			console.log('WSRRL : ' + WSRRL);
			ws = new WebSocket(WSRRL)
 			console.log('WebSocket Connecting')
 			ws.binaryType = 'arraybuffer';
 			
			function addDiv(pid,html,attr)
			{
				//動態新增元素div
    		attr = attr || {};
　　　　let parent = document.getElementById(pid);
　　　　let div = document.createElement("div");//新增 div
     		for(let i in attr)
     		{
     			//設定 div屬性
     			//console.log('attr[i] = ' + attr[i]);
        	div.setAttribute(i,attr[i]);
     		}　
　　　　div.innerHTML = html;
				parent.appendChild(div);
			}
			
 			function PortList()
 			{
 	  		for(let i = 0; i < 240; i++)
	  		{
	  			if(m_MachineID[i] > 0)
	  			{
	  				console.log('m_OutPhyPortNo[' + i + ']= ' + m_OutPhyPortNo[i]);
		  			console.log('m_MachineID[' + i + ']= ' + m_MachineID[i]);
		  			var OutPortNo = m_OutPhyPortNo[i];
		  			var MachineId = m_MachineID[i];
  					var value = MachineId + '-' + OutPortNo;
  					var Color = MachineColorArray[MachineId - 1];
     				//console.log("value = " + value);
						addDiv("parent",'',{"class":"box", "id":"box-" + i});//呼叫
						addDiv("box-" + i,value,{"class":"title", "id":"title-" + i, "style":"background: " + Color});//呼叫
						addDiv("box-" + i,'',{"class":"status", "id":"status-" + i});//呼叫
						addDiv("box-" + i,'',{"class":"callid", "id":"callid-" + i});//呼叫
						addDiv("box-" + i,'',{"class":"extno", "id":"extno-" + i, "style":"background: #00bd30"});//呼叫
						addDiv("box-" + i,'',{"class":"operator", "id":"operator-" + i, "style":"background: #00bd30"});//呼叫
						addDiv("box-" + i,'',{"class":"address", "id":"address-" + i});//呼叫
					}				
				}
							
　　　　//let outport = document.getElementById("2");
				//outport.innerhtml = '23e23e23';
			}
 			
			//開啟後執行的動作，指定一個 function 會在連結 WebSocket 後執行
			
			ws.onopen = () =>
			{
    			console.log('open connection')
				//ExtNum = sessionStorage.getItem('ExtNum');
    			//console.log('Extension Number: ' + ExtNum);
				var OperatorKey = sessionStorage.getItem('OperatorKey');
    			console.log('OperatorKey = ' + OperatorKey);
   				ws.send(OperatorKey);
				const para = document.querySelector('p1');
 				para.textContent = "已連線";
			}

			//關閉後執行的動作，指定一個 function 會在連結中斷後執行
			ws.onclose = () => {
		    console.log('close connection')
				const para = document.querySelector('p1');
 				para.textContent = "斷線";
			}

			function GetCustomerInfoResponse()
			{
				if(this.readyState === XMLHttpRequest.DONE && this.status === 200)
				{
					console.log(this.responseText);
					var Response = JSON.parse(this.responseText);

					if(Response.status == false)
					{
						
					}
					else if(Response.status == true)
					{
						FoundCustomer = Response.numbers;
						console.log("FoundCustomer : " + FoundCustomer);
						if(FoundCustomer == 1)
						{
							CustomerName = Response.data[0][3];
							CustomerCounty = Response.data[0][6];
							CustomerTownships = Response.data[0][7];
							CustomerAddress = Response.data[0][8];
							CustomerInBlackList = Response.data[0][10];							
						}
					}
				}
			}
			
			function GetCustomerInfo(TelNo)
			{
				FoundCustomer = 0;
				//CustomerName = '';
				//CustomerCounty = '';
				//CustomerTownships = '';
				//CustomerAddress = '';
				CustomerInBlackList = 0;
			  var xmlHttp = new XMLHttpRequest();
			  var URL = BackEndURL + 'GetCustomerInfoByTelno.php?TelNo=' + TelNo;
				xmlHttp.open( "GET", URL, false);
				xmlHttp.onreadystatechange = GetCustomerInfoResponse;
				xmlHttp.send();				
			}
						
			ws.onmessage = event => {
    		console.log(event)
	 			var Event = JSON.parse(event.data);
    		console.log(Event.data);
    		
    		var MachineID = Event.data[0];
	 			var CallType = Event.data[1];
	 			var CallStatus = Event.data[2];
				var PhyPortNo = Event.data[3];
				var VPortNo = Event.data[4];
				var TelNum = Event.data[5];
				var ExtNumData = Event.data[6];
				CustomerName = Event.data[7];
				console.log("CustomerName: " + CustomerName);
				console.log("TelNum: " + TelNum);
				
				GetCustomerInfo(TelNum);
				FoundOperator = 0;
				GetOperatorInfoByExtNo(ExtNumData);
				console.log("FoundCustomer: " + FoundCustomer);
				if(FoundCustomer == 1)
				{
					console.log("CustomerName: " + CustomerName);
				}
				
				console.log("ExtNum : " + ExtNum);
    		if(ExtNum == ExtNumData && ExtNum != 0)
    		{
    			if((CallStatus == 3 && CallType == 0) || (CallStatus == 2 && CallType == 1))
    			{
						sessionStorage.setItem("Page", 3);
						sessionStorage.setItem("TelNo", TelNum);				
						top.location.href="index.html";			
					}
				}
				
				var CallTypeTextColor;
				var CallTypeBkColor;
				CallTypeBkColor = "black";
				CallTypeTextColor = "black";
				if(CustomerInBlackList == 1)
				{
						CallTypeBkColor = "#000000";
						CallTypeTextColor = "#FFFFFF";
				}
				else
				{
					if(CallType == 0)
						CallTypeBkColor = "#1FD3AB";
					else if(CallType == 1)
						CallTypeBkColor = "#FFFFBC";
					else if(CallType == 2)
						CallTypeBkColor = "#E7B0E8";
				}
				
	 			var StrCallStatus;
	 			if(CallStatus == 1)
				{
	 				StrCallStatus = "撥入";
					CallTypeBkColor = "#FFC9C9";
					CallTypeTextColor = "black";
				}
	 			else if(CallStatus == 2)
				{
	 				StrCallStatus = "撥出";
				}
	 			else if(CallStatus == 3)
				{
	 				StrCallStatus = "通話";
					CallTypeBkColor = "#82FF82";
					CallTypeTextColor = "black";
				}
	 			else if(CallStatus == 4)
	 			{
	 				StrCallStatus = "待機";
					CallTypeBkColor = "#bbbbbb";
					CallTypeTextColor = "black";
				}
				

				if(FoundOperator == 1)
				{
					document.getElementById('extno-' + VPortNo).innerHTML = ExtNumData;
					document.getElementById('operator-' + VPortNo).innerHTML = '客服: ' + OperatorName;
				}			
				if(FoundCustomer == 1)
				{
					document.getElementById('callid-' + VPortNo).innerHTML = CustomerName;
					document.getElementById('address-' + VPortNo).innerHTML = CustomerCounty + CustomerTownships + CustomerAddress;
				}
				else
				{
					document.getElementById('callid-' + VPortNo).innerHTML = TelNum;
					document.getElementById('address-' + VPortNo).innerHTML = '新客戶';
					CallTypeBkColor = "#82FF82";
				}
				if(CallStatus == 4)
				{
					document.getElementById('callid-' + VPortNo).innerHTML = '';
					document.getElementById('address-' + VPortNo).innerHTML = '';
					document.getElementById('extno-' + VPortNo).innerHTML = '';
					document.getElementById('operator-' + VPortNo).innerHTML = '';
				}
				document.getElementById('status-' + VPortNo).innerHTML = StrCallStatus;
				document.getElementById('status-' + VPortNo).style.background = CallTypeBkColor;
				document.getElementById('status-' + VPortNo).style.color = CallTypeTextColor;
				document.getElementById('callid-' + VPortNo).style.background = CallTypeBkColor;
				document.getElementById('callid-' + VPortNo).style.color = CallTypeTextColor;
			}
			
			ws.onerror = event => {
    		console.log(event);
	 			//var Event = JSON.parse(event);
				//console.log("Event.type: " + Event.type);
				const para = document.querySelector('p1');
 				para.textContent = "請檢察主機程式是否開啟";
			}			
			
			function Disconnect()
			{
				ws.close();
			}
			
			function GetOperatorInfoResponse(evt)
			{	
				const para = document.querySelector('p1');
				//console.log('Complete User Login');
				//console.log(this.status);       	
				if(this.readyState === XMLHttpRequest.DONE && this.status === 200)
				{
					//console.log(this.responseText);
					var Response = JSON.parse(this.responseText);
			
					if(Response.status == false)
					{
						para.textContent = '失敗:' + Response.message;
					}
					else if(Response.status == true)
					{
						let Data = Response.data[0];
						console.log("data : " + Data);
						//para.textContent = '成功';	
						OperatorName = Data[2];
						console.log("OperatorName : " + OperatorName);
						MachineBitMask = Data[3];
						console.log("MachineBitMask : " + MachineBitMask);
						ExtNum = Data[7];
						sessionStorage.setItem('ExtNum', ExtNum);						
						console.log("ExtNum : " + ExtNum);
						//para.textContent = 'MachineBitMask: ' + MachineBitMask;
						OutPortNums = 0;
						VPortIndex = 0;
						let Counter = 0;
						let MachineType = new Array(10);
						MachineType[0] = 2;
						MachineType[1] = 2;
						MachineType[2] = 2;
						for(let MachineIndex = 0; MachineIndex < 10; MachineIndex++)
						{
							let Bit = MachineBitMask & (1 << MachineIndex);
							if (Bit != 0)
							{
								
                                GetOutPortNums(MachineType[Counter], MachineIndex + 1);
								Counter++;
							}
						}
						console.log("Counter : " + Counter);
						const $Title1 = $("#Title1");
						if(Counter == 1)
						{
							const $Title2 = $("#Title2");
							$Title1.text('嗨！ ' + OperatorName + '您好！歡迎登入ADICTI電話中心系統，請確認您的座位分機號碼為【' + ExtNum + '】。');			
							$Title2.text('如果不是請使用手機掃描座位上的QR Code後，輸入您的工號變更分機號碼。');
							$Title2.css("color", "rgb(34 53 159)");
						}
						else
							$Title1.text('嗨! ' + OperatorName + '主管您好!歡迎登入ADICTI電話中心系統。');			
						$Title1.css("color", "rgb(34 53 159)");
						PortList();
					}
				}
			}
			
			function GetOperatorInfoByExtNoResponse()
			{
				if(this.readyState === XMLHttpRequest.DONE && this.status === 200)
				{
					console.log(this.responseText);
					var Response = JSON.parse(this.responseText);

					if(Response.status == false)
					{
						
					}
					else if(Response.status == true)
					{
						FoundOperator = 1;
						console.log("FoundOperator : " + FoundOperator);
						if(FoundOperator == 1)
						{
							OperatorName = Response.data[0][3];
						}
					}
				}
			}
			
			function GetOperatorInfoByExtNo(ExtNo)
			{
				FoundOperator = 0;
				var xmlHttp = new XMLHttpRequest();
			  var URL = BackEndURL + 'GetOperatorInfoByExtNo.php?ExtNo=' + ExtNo;
				console.log('URL = ' + URL);
				xmlHttp.open( "GET", URL, false);
				xmlHttp.onreadystatechange = GetOperatorInfoByExtNoResponse;
				xmlHttp.send();
			}

			function Connection()
			{
  			var xmlHttp = new XMLHttpRequest();
				const para = document.querySelector('p1');
				if(para != null)
					para.textContent = "連線中";
				var OperatorKey = sessionStorage.getItem('OperatorKey');
				console.log("OperatorKey : " + OperatorKey);
  				var URL = BackEndURL + 'GetOperatorInfo.php?Id=' + OperatorKey;
				  console.log("URL : " + URL);
				xmlHttp.open( "GET", URL, false);
				xmlHttp.onreadystatechange = GetOperatorInfoResponse;
				xmlHttp.send();
			}
			
		</script>
	</head>
	<body>
		<h1 id="Title1"></h1>
		<h1 id="Title2"></h1>
		<p1></p1><br>
		<p2></p2><br>
		<div id="parent"></div>		
		<input type="button" NAME="login" id="BtnLogin" value="離線" onclick="Disconnect()"/>
		<script type="text/javascript">Connection()</script>
	</body>	
</html>
