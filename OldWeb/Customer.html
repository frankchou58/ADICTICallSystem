			//關閉後執行的動作，指定一個 function 會在連結中斷後執行
			ws.onclose = () => {
		    console.log('close connection')
				const para = document.querySelector('p1');
 				para.textContent = "斷線";
				sessionStorage.setItem("Page", 1);
				top.location.href="index.html";

			ws.onmessage = event => {
    		console.log(event)
	 			var Event = JSON.parse(event.data);
    		//console.log(Event.data);
    		var MachineID = Event.data[0];
	 			var CallType = Event.data[1];
	 			var CallStatus = Event.data[2];
				var PhyPortNo = Event.data[3];
				var VPortNo = Event.data[4];
				var TelNum = Event.data[5];
				var ExtNumData = Event.data[6];
    		
    		if(ExtNum == ExtNumData && CallStatus == 4)
    		{
					sessionStorage.setItem("Page", 1);
					top.location.href="index.html";			
				}
			}
			
			ws.onerror = event => {

			function Disconnect()

			function GetCustomerInfoResponse()
			{
				var result = document.getElementById('result');
				console.log(this.responseText);       	
				if(this.readyState === XMLHttpRequest.DONE && this.status === 200)
				{
					var RespArray = JSON.parse(this.responseText);
					if(RespArray.status == false)
					{
						Response = 0;
						result.style.color = "red";
						result.innerHTML = RespArray.message;	
					}
					else
					{
	 					console.log('RespArray.numbers:' + RespArray.numbers);
						if(RespArray.numbers == 1)
						{
							var CustomerInfoArray = RespArray.data[0];
							sessionStorage.setItem("CustomerInfo", CustomerInfoArray);
						}
						else
						{
							sessionStorage.setItem("CustomerInfo", "null");
						}
					}
				}
			}
			
			function CustomerInfoResponse()
			{
				var result = document.getElementById('result');
				//console.log('Complete Added Customer');
 				//console.log(this.status);       	
  			if(this.readyState === XMLHttpRequest.DONE && this.status === 200)
  			{
  				console.log(this.responseText);
  				var Val;
  				Val = JSON.parse(this.responseText);
					console.log(Val.status);       	
					sessionStorage.setItem('AddedCustomer', false);
					if(Val.status == false)
					{
						result.style.color = "red";
						if(Val.message == 23000)
						{
							result.innerHTML = '失敗: 客戶識別碼重複';
						}
						AddedCustomerResult = 0;
					}
					else if(Val.status == true)
					{
						result.style.color = "blue";
						if(RespType == 1)
							result.innerHTML = '成功新增新客戶' + Name;
						else if(RespType == 2)
							result.innerHTML = '成功修改客戶[' + Name + ']資料';
						AddedCustomerResult = 1;
					}
				}
			}

				console.log('客戶編號: ' + CustomerID.value);

				console.log('客戶電話: ' + CustomerTelNo.value);
				console.log('客戶聯絡地址: ' + CustomerCounty.value + CustomerTownships.value + CustomerAddress.value);
				console.log('客戶生日: ' + CustomerBirthday.value);
				console.log('客戶性別: ' + CustomerGenderIndex);
				
				RespType = 1;
				var xmlHttp = new XMLHttpRequest();
 				var URL = BackEndURL + 'AddCustomer.php?CustomerId=' + CustomerID.value + '&Name=' + CustomerName.value + '&Gender=' + CustomerGenderIndex + 
 					'&TelNo=' + CustomerTelNo.value + '&County=' + CustomerCounty.value + '&Townships=' + CustomerTownships.value + '&Address=' + CustomerAddress.value + '&Birthday=' + CustomerBirthday.value;
				console.log('URL = ' + URL);
 				xmlHttp.open( "GET", URL, false);
 				xmlHttp.onreadystatechange = CustomerInfoResponse;
 				xmlHttp.send();
				
			}
